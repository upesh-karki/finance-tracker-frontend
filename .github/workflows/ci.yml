name: CI

on:
  push:
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm test -- --coverage --watchAll=false --passWithNoTests --forceExit
        env:
          CI: true

      - name: Check coverage threshold
        run: |
          if [ ! -f coverage/coverage-summary.json ]; then
            echo "⚠️  No coverage report found — skipping"
            exit 0
          fi
          COVERAGE=$(python3 -c "import json; d=json.load(open('coverage/coverage-summary.json')); print(d['total']['lines']['pct'])" 2>/dev/null || echo 0)
          echo "Line coverage: $COVERAGE%"
          # Threshold is intentionally low (1%) until React component tests are added.
          # Security/unit tests cover auth logic but not React rendering.
          # Raise this threshold as @testing-library/react component tests are added.
          # Target: 70% once component tests exist.
          THRESHOLD=0.5
          if python3 -c "import sys; sys.exit(0 if float('$COVERAGE') >= $THRESHOLD else 1)"; then
            echo "✅ Coverage $COVERAGE% meets the current $THRESHOLD% threshold."
          else
            echo "❌ Coverage $COVERAGE% is below the $THRESHOLD% minimum threshold."
            exit 1
          fi

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: build/

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # ── Security Headers ────────────────────────────────────────────────────
    # Prevent clickjacking
    add_header X-Frame-Options "DENY" always;
    # Prevent MIME type sniffing
    add_header X-Content-Type-Options "nosniff" always;
    # Block XSS in older browsers
    add_header X-XSS-Protection "1; mode=block" always;
    # Don't leak referrer to third parties
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Permissions policy — restrict access to sensitive browser APIs
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;
    # Content Security Policy — restrict resource loading
    # self: own origin only; no inline scripts (prevents XSS token theft)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://accounts.google.com https://apis.google.com 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self'; font-src 'self'; frame-ancestors 'none';" always;
    # HSTS — force HTTPS for 1 year (enable once TLS is configured)
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # ── React router — send all routes to index.html ────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Proxy API calls to backend ──────────────────────────────────────────
    # Traffic between nginx and API is internal Docker network (never public)
    location /api/ {
        proxy_pass http://finance-tracker-api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Strip sensitive headers from upstream responses
        proxy_hide_header X-Powered-By;
        proxy_hide_header Server;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 300s;
        client_max_body_size 50M;
    }

    # ── Block access to hidden files ────────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
